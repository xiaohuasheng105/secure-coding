{% extends "base.html" %}
{% block title %}관리자 대시보드{% endblock %}
{% block content %}
<h2>관리자 대시보드</h2>
<ul>
  <li>전체 사용자 수: {{ stats.user_count }}</li>
  <li>전체 상품 수: {{ stats.product_count }}</li>
  <li>전체 신고 수: {{ stats.report_count }}</li>
</ul>
<p>
  <a href="{{ url_for('admin_users') }}">사용자 관리</a> |
  <a href="{{ url_for('admin_products') }}">상품 관리</a> |
  <a href="{{ url_for('admin_reports') }}">신고 내역</a>
</p>
{% endblock %}
