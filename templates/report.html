{% extends "base.html" %}
{% block title %}신고하기{% endblock %}
{% block content %}
<h2>신고하기</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  신고 대상 종류:
  <select name="target_type" required>
    <option value="">선택해주세요</option>
    <option value="user" {% if prefill_type == 'user' %}selected{% endif %}>사용자</option>
    <option value="product" {% if prefill_type == 'product' %}selected{% endif %}>상품</option>
  </select><br>
  신고 대상 ID: <input type="text" name="target_id" value="{{ prefill_id }}" maxlength="64" required><br>
  신고 사유: <br>
  <textarea name="reason" rows="4" cols="50" maxlength="500" required></textarea><br>
  <button type="submit">신고 접수</button>
</form>
{% endblock %}
